<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Twenty One: Static Edition</title>
    <meta
      name="description"
      content="Juego tipo Twenty One para GitHub Pages con bot, local y online P2P."
    />
    <link rel="stylesheet" href="styles.css" />
    <script>
      window.TWENTY_ONE_CONFIG = window.TWENTY_ONE_CONFIG || {
        siteVersion: "1.0.0",
        peer: {
          host:
            localStorage.getItem("twentyone.peer.host") ||
            "your-peer-server.example.com",
          port: Number(localStorage.getItem("twentyone.peer.port") || 443),
          path: localStorage.getItem("twentyone.peer.path") || "/twentyone",
          secure: localStorage.getItem("twentyone.peer.secure") !== "false",
          debug: 1,
        },
      };
    </script>
    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
